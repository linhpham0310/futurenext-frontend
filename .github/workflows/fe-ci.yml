name: Frontend CI

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Linter
        run: npm run lint || true

      - name: Run Type check
        run: npx tsc --noEmit || true

      - name: Run Build
        run: npm run build
